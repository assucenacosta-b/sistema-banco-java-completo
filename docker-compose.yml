services:
  postgres:
    image: postgres:16
    container_name: sistema_banco_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sistema_banco
    ports:
      - "5432:5432"
    volumes:
      - sistema_banco_data:/var/lib/postgresql/data

volumes:
  sistema_banco_data:
